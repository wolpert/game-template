# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily" # Check for updates every day
    ignore:
      # Pin AGP to the 8.x line. AGP 9.x is alpha and IntelliJ IDEA only
      # supports up to 9.0.0-alpha06 — bumping past that breaks IDE sync.
      # Revisit when AGP 9.x ships stable and IDEA catches up.
      - dependency-name: "com.android.tools.build:gradle"
        update-types:
          - "version-update:semver-major"
    groups:
      # Specify a name for the group, which will be used in pull request titles
      # and branch names
      dev-dependencies:
        # Define patterns to include dependencies in the group (based on
        # dependency name)
        applies-to: version-updates # Applies the group rule to version updates
        patterns:
          - "*"       # Yolo!

